<!DOCTYPE html>
<html lang="az">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Structure | Busamania RC Azerbaijan</title>
    <meta name="description"
        content="Busamania RC Azerbaijan Klub Strukturu — President, Vitse President, Katib, Mexanik, Xəzinədar və Üzvlər.">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ── PAGE HERO ── */
        .struct-hero {
            background: linear-gradient(135deg, #0a0800 0%, #000 60%);
            border-bottom: 2px solid var(--accent-gold);
            padding: 3.5rem 2rem 2.5rem;
            text-align: center;
        }

        .struct-hero h1 {
            font-size: clamp(1.8rem, 4vw, 3.5rem);
            font-weight: 900;
            font-style: italic;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #b8860b, #d4af37, #fff8b0, #d4af37, #b8860b);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .struct-hero p {
            font-size: 0.75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        /* ── HIERARCHY WRAPPER ── */
        .struct-wrapper {
            max-width: 1100px;
            margin: 0 auto;
            padding: 3rem 2rem 5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* ── CONNECTOR LINES ── */
        .conn-v {
            width: 2px;
            height: 40px;
            background: linear-gradient(to bottom, var(--accent-gold), rgba(212, 175, 55, 0.3));
        }

        /* ── MEMBER CARD ── */
        .struct-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.8rem 1.4rem 1.5rem;
            text-align: center;
            width: 200px;
            transition: border-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .struct-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .struct-card:hover {
            border-color: var(--accent-gold);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(212, 175, 55, 0.15);
        }

        .struct-card:hover::before {
            opacity: 1;
        }

        .struct-card.president {
            width: 240px;
            border-color: rgba(212, 175, 55, 0.5);
            background: linear-gradient(145deg, #111 0%, #0d0900 100%);
        }

        .struct-card.president::before {
            opacity: 0.6;
        }

        .struct-photo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 1rem;
            border: 2px solid var(--border);
            overflow: hidden;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.3s ease;
        }

        .struct-card.president .struct-photo {
            width: 120px;
            height: 120px;
            border-color: rgba(212, 175, 55, 0.5);
        }

        .struct-card:hover .struct-photo {
            border-color: var(--accent-gold);
        }

        .struct-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .struct-photo .photo-placeholder {
            font-size: 2.5rem;
            opacity: 0.25;
        }

        .struct-card.president .struct-photo .photo-placeholder {
            font-size: 3rem;
        }

        .struct-role {
            display: inline-block;
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent-gold);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px;
            padding: 3px 10px;
            margin-bottom: 0.7rem;
        }

        .struct-name {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-color);
            line-height: 1.3;
        }

        .struct-surname {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-color);
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .section-label {
            font-size: 0.65rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(212, 175, 55, 0.5);
            text-align: center;
            padding: 1.5rem 0 0.5rem;
        }

        .tier-single {
            display: flex;
            justify-content: center;
        }

        .tier-triple {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .tier-members {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            width: 100%;
            margin-top: 0.5rem;
        }

        .tier-divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(212, 175, 55, 0.2), transparent);
            margin: 2rem 0;
        }

        .empty-msg {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            padding: 3rem;
        }

        @media (max-width: 768px) {
            .tier-members {
                grid-template-columns: repeat(2, 1fr);
            }

            .tier-triple {
                gap: 1rem;
            }

            .struct-card {
                width: 160px;
                padding: 1.4rem 1rem;
            }

            .struct-card.president {
                width: 180px;
            }

            .struct-photo {
                width: 80px;
                height: 80px;
            }

            .struct-card.president .struct-photo {
                width: 95px;
                height: 95px;
            }
        }

        @media (max-width: 480px) {
            .tier-members {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.8rem;
            }

            .tier-triple {
                flex-direction: column;
                align-items: center;
            }

            .struct-card {
                width: 100%;
                max-width: 260px;
            }

            .struct-card.president {
                width: 100%;
                max-width: 260px;
            }
        }
    </style>
</head>

<body class="page-transition" data-page="structure">

    <div id="nav-placeholder"></div>

    <!-- Page Hero -->
    <div class="struct-hero fade-in">
        <h1 data-i18n="structure.h1">Club Structure</h1>
        <p data-i18n="structure.sub">Busamania RC Azerbaijan — Leadership &amp; Members</p>
    </div>

    <!-- Structure Hierarchy -->
    <div class="struct-wrapper">
        <p class="section-label">Leadership</p>
        <div class="tier-single fade-in" id="tier-president"></div>
        <div class="conn-v" id="conn-vp" style="display:none;"></div>
        <div class="tier-single fade-in" id="tier-vp"></div>
        <div class="conn-v" id="conn-officers" style="display:none;"></div>
        <div class="tier-triple fade-in" id="tier-officers"></div>
        <div class="tier-divider"></div>
        <p class="section-label">Members</p>
        <div class="tier-members fade-in" id="tier-members"></div>
    </div>

    <footer class="site-footer">
        <div class="footer-inner">
            <p class="footer-brand">BUSAMANIA RC</p>
            <p class="footer-copy">© 2026 Busamania RC Azerbaijan. Bütün hüquqlar qorunur.</p>
        </div>
    </footer>

    <script src="js/i18n.js"></script>
    <script src="js/main.js"></script>
    <script>
        function createCard(member, isPresident) {
            var cls = isPresident ? 'struct-card president' : 'struct-card';
            var photoHTML = member.image
                ? '<img src="' + member.image + '" alt="' + (member.name || '') + '">'
                : '<span class="photo-placeholder">👤</span>';

            var roleEmoji = {
                'President': '🏆', 'Vitse-President': '🥈', 'Katib': '📋',
                'Mexanik': '🔧', 'Xəzinədar': '💰', 'Üzv': '🏍️'
            };
            var emoji = roleEmoji[member.role] || '🏍️';
            var nameParts = (member.name || '').split(' ');
            var firstName = nameParts[0] || '';
            var surname = nameParts.slice(1).join(' ') || '';

            return '<div class="' + cls + '">' +
                '<div class="struct-photo">' + photoHTML + '</div>' +
                '<span class="struct-role">' + emoji + ' ' + (member.role || 'Üzv') + '</span>' +
                '<p class="struct-name">' + firstName + '</p>' +
                (surname ? '<p class="struct-surname">' + surname + '</p>' : '') +
                '</div>';
        }

        async function loadStructure() {
            var members = [];
            try {
                var res = await fetch('data/site-data.json');
                if (res.ok) {
                    var data = await res.json();
                    members = data.members || [];
                }
            } catch (e) { }

            if (!members.length) {
                try { members = JSON.parse(localStorage.getItem('busamania_members')) || []; } catch (e) { }
            }

            if (!members.length) {
                document.getElementById('tier-president').innerHTML = '<p class="empty-msg">Admin paneldən üzv əlavə edin</p>';
                return;
            }

            var president = members.filter(function (m) { return m.role === 'President'; });
            var vp = members.filter(function (m) { return m.role === 'Vitse-President'; });
            var officers = members.filter(function (m) { return m.role === 'Katib' || m.role === 'Mexanik' || m.role === 'Xəzinədar'; });
            var regular = members.filter(function (m) { return m.role === 'Üzv' || !m.role; });

            if (president.length) {
                document.getElementById('tier-president').innerHTML = createCard(president[0], true);
            }

            if (vp.length) {
                document.getElementById('tier-vp').innerHTML = createCard(vp[0], false);
                document.getElementById('conn-vp').style.display = '';
            }

            if (officers.length) {
                document.getElementById('tier-officers').innerHTML = officers.map(function (m) { return createCard(m, false); }).join('');
                document.getElementById('conn-officers').style.display = '';
            }

            if (regular.length) {
                document.getElementById('tier-members').innerHTML = regular.map(function (m) { return createCard(m, false); }).join('');
            }
        }

        document.addEventListener('DOMContentLoaded', loadStructure);
    </script>
</body>

</html>
